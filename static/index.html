<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova</title>
    <script src="/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d0d0d;
            --bg2:       #111111;
            --bg3:       #1a1a1a;
            --border:    #222222;
            --cyan:      #00bcd4;
            --cyan-dim:  #00838f;
            --text:      #e0e0e0;
            --text-dim:  #666666;
            --user-bg:   #1a3a4a;
            --user-text: #80deea;
            --danger:    #f44336;
        }

        body {
            font-family: monospace;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
